name: extend_screen
description: A Flutter plugin for multi-window support on desktop (Windows, macOS, Linux)
  and dual-display / secondary-screen support on Android (POS devices).
version: 0.1.0+1
repository: https://github.com/kechankrisna/extend_screen
license: MIT

environment:
  sdk: ">=3.9.2 <4.0.0"
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Desktop multi-window (macOS / Windows / Linux)
  desktop_multi_window: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: app.mylekha.extend_screen
        pluginClass: ExtendScreenPlugin
